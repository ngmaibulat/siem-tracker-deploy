# REFERENCE ONLY — no longer mounted. The running config is generated by the
# setup wizard (src/lib/nginxConfig.ts) into the proxy_conf volume shared between
# the app and nginx containers; the wizard's summary step shows and exports it.
# This file is kept as a template for manual installs and documents the shape of
# what the generator emits (note: generated configs reference
# /etc/nginx/certs/cert.pem + key.pem, the filenames src/lib/tls.ts writes).

upstream siem_app {
    server app:3000;
}

# Maps the Connection header for WebSocket-style upgrades: "upgrade" when the
# client requests one, otherwise empty (so keep-alive proxying works normally).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Plain HTTP — redirect everything to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Backup/restore uploads (.sqlite exports and pg_dump custom-format files) and
    # the base64 profile-photo upload easily exceed nginx's 1 MB default, which
    # would otherwise 413 the request before it reaches the app.
    client_max_body_size 200m;

    # The external scheduler service reaches the app directly over the internal
    # compose network (APP_INTERNAL_URL) and never through nginx — these routes
    # have no auth requirement beyond that network boundary when SCHEDULER_TOKEN
    # is unset, so block them from the public listener.
    location ^~ /api/scheduler/ {
        return 403;
    }

    location / {
        proxy_pass http://siem_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # src/lib/authEvents.ts reads X-Forwarded-For to log the client IP.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Harmless if unused; keeps any future upgrade requests working.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # The legacy pg_dump restore can run for a while; give it room before
        # nginx times the upstream out.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
