# Production / manual-QA stack for SIEM Source Tracker.
#
# Topology: nginx (TLS termination) → app → mariadb (DOMAIN plane: 1 master + 2
# async binlog/GTID replicas) + postgres (CONTROL plane: identity/auth/audit) +
# redis + mailhog + squid + meilisearch — mirroring the app repo's
# containers/default dev lab topology (see its docker-compose.yml header), but
# with every service pulled from a registry instead of built from source: the
# app runs the PUBLISHED image `ngmaibulat/usiem-tracker:latest` (publicly
# pullable, no login), and MariaDB/Postgres/Redis/MailHog/Squid are all stock
# upstream images — this file never builds anything. Only nginx publishes ports
# (80/443) plus mailhog's web UI (8025, for reading QA emails in a browser);
# the app, MariaDB, Postgres, Redis and Meilisearch stay on the internal
# compose network only. Versioned app image tags (vX.Y.Z) exist in the
# registry for rollback — see the rollback section in DEPLOY.md.
#
# Nginx config + certs are GENERATED BY THE APP (Initial Configuration Wizard)
# and shared through named volumes: the app writes into /app/nginx (proxy_conf)
# and /app/tls (proxy_certs); nginx reads the same volumes at /etc/nginx/conf.d
# and /etc/nginx/certs. On first boot the app's entrypoint seeds a bootstrap
# HTTP-only config so the wizard is reachable on port 80 before any certificate
# exists; once the wizard has generated the real config + cert, apply them with:
#
#   docker compose exec nginx nginx -s reload
#
# Run from this folder — it's the default `docker-compose.yml`, so no -f flag:
#
#   cd <repo-root>
#   # pull the pinned image (optional — `run`/`up` pull it if missing):
#   docker compose pull
#   # one-time / on schema change — apply migrations, then exit:
#   docker compose run --rm migrate
#   # bring the stack up:
#   docker compose up -d
#
# Required .env keys: APP_SECRET, APP_URL, TARGET_DATE, MEILI_MASTER_KEY.
# Optional: SNAPSHOT_TOKEN (enables the cron snapshot endpoint),
# POSTGRES_PASSWORD, MARIADB_ROOT_PASSWORD, MARIADB_PASSWORD, MARIADB_REPL_PASSWORD.
# See example.env in this folder.

services:
  # CONTROL plane only in this topology (identity/auth/audit — see
  # CONTROL_DATABASE_URL on the app/migrate services below). The DOMAIN plane
  # lives on MariaDB (mariadb-master, below), a live example of the two planes
  # running on independent providers (FR-43 in the app repo). Also doubles as
  # the FR-42 restore-helper (RESTORE_PG_URL) for legacy pg_dump restores.
  # NOTE: POSTGRES_DB only takes effect on a fresh/empty postgres_data volume —
  # if this compose file is applied to an ALREADY-INITIALIZED postgres_data
  # volume that used to hold siem_source_tracker (the pre-MariaDB topology),
  # this rename has no effect on the existing database; migrate a fresh volume
  # or rename the DB by hand.
  postgres:
    image: postgres:18
    container_name: siem-source-tracker-postgres
    environment:
      POSTGRES_DB: siem_source_tracker_control
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siem_password}
    volumes:
      # Postgres 18+ stores data in a major-version subdir; mount the parent dir
      # (not .../data) per the official image convention. See the pg-major-upgrade
      # warning in DEPLOY.md before bumping this image tag on an existing volume.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem -d siem_source_tracker_control"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # DOMAIN plane: classic async (binlog/GTID) MariaDB replication — 1 master +
  # 2 slaves. The app's DATABASE_URL points only at the master (no
  # read/write-split logic); the slaves exist for QA to inspect replication
  # behavior via `docker compose exec mariadb-slave1 ...`. No ports published
  # (unlike the app repo's dev lab, which exposes 3326-3328 for convenience) —
  # this repo's convention is that only nginx is reachable from outside the
  # compose network.
  mariadb-master:
    image: mariadb:11.8
    container_name: siem-source-tracker-mariadb-master
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb_root_password}
      MARIADB_DATABASE: siem_source_tracker
      MARIADB_USER: siem
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-siem_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    entrypoint:
      - sh
      - -c
      - exec docker-entrypoint.sh mariadbd --server-id=1
    volumes:
      - ./mariadb/replication.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - ./mariadb/init-master:/docker-entrypoint-initdb.d:ro
      - mariadb_master_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # Replication wiring below is a SHELL command in the entrypoint, not SQL —
  # docker-entrypoint-initdb.d only runs once, before the master is reachable
  # over the network, and never reruns on a plain restart. The backgrounded
  # subshell instead retries until the master is actually usable and then
  # issues CHANGE MASTER TO — safe/idempotent to rerun on every container
  # start since GTID position persists in the volume.
  mariadb-slave1:
    image: mariadb:11.8
    container_name: siem-source-tracker-mariadb-slave1
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb_root_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    depends_on:
      mariadb-master:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - >-
        (
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -hmariadb-master -urepl -p"$$MARIADB_REPL_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e "STOP SLAVE; CHANGE MASTER TO MASTER_HOST='mariadb-master', MASTER_USER='repl', MASTER_PASSWORD='$$MARIADB_REPL_PASSWORD', MASTER_USE_GTID=slave_pos; START SLAVE;"
        ) &
        exec docker-entrypoint.sh mariadbd --server-id=2
    volumes:
      - ./mariadb/replication.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - mariadb_slave1_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mariadb-slave2:
    image: mariadb:11.8
    container_name: siem-source-tracker-mariadb-slave2
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb_root_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    depends_on:
      mariadb-master:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - >-
        (
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -hmariadb-master -urepl -p"$$MARIADB_REPL_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e "STOP SLAVE; CHANGE MASTER TO MASTER_HOST='mariadb-master', MASTER_USER='repl', MASTER_PASSWORD='$$MARIADB_REPL_PASSWORD', MASTER_USE_GTID=slave_pos; START SLAVE;"
        ) &
        exec docker-entrypoint.sh mariadbd --server-id=3
    volumes:
      - ./mariadb/replication.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - mariadb_slave2_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # SMTP catch-all for manual QA — lets testers read outbound emails (invites,
  # password resets, notifications) in a browser without real mail
  # infrastructure. Wired via SMTP_URL below (setup-wizard prefill only;
  # runtime mail config is stored in the DB via /admin/smtp once configured).
  mailhog:
    image: mailhog/mailhog:latest
    container_name: siem-source-tracker-mailhog
    ports:
      - "8025:8025"   # web UI — view QA mail in a browser
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: siem-source-tracker-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Outbound egress proxy (FR-32). All outbound HTTP/HTTPS from the app
  # (Telegram, endpoint health probes, npm update checks, holiday import) is
  # routed through it via HTTP_PROXY/HTTPS_PROXY on the app service, so its
  # access.log collects realistic proxy-traffic samples; the admin log viewer
  # (/admin/logs) tails them from the shared squid_logs volume. HTTPS appears
  # as `CONNECT host:443` tunnel lines — expected without SSL bump. Optional:
  # the app degrades gracefully when squid is down (nothing depends on it).
  squid:
    image: ubuntu/squid:latest
    container_name: siem-source-tracker-squid
    # Pre-create the log files world-readable: squid's own 0640 would hide
    # them from the app container reading the shared volume. Must replace the
    # image ENTRYPOINT (which would pass these args to squid).
    entrypoint:
      - sh
      - -c
      - >-
        touch /var/log/squid/access.log /var/log/squid/cache.log &&
        chown -R proxy:proxy /var/log/squid && chmod 755 /var/log/squid &&
        chmod 644 /var/log/squid/*.log &&
        exec squid -f /etc/squid/squid.conf -N
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - squid_logs:/var/log/squid
    restart: unless-stopped

  # Search engine. Provisioned for future use — the app does not talk to it yet
  # (no MEILI_* code), so it has no `depends_on` and runs idle. Internal-only:
  # reachable on the compose network as meilisearch:7700, never published.
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: siem-source-tracker-meilisearch
    environment:
      # MEILI_ENV=production refuses to start without a master key >= 16 bytes.
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      # getmeili images ship wget (busybox); if a future tag drops it, this check
      # can be removed — nothing depends_on meilisearch, so it's only informational.
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ngmaibulat/usiem-tracker:latest
    container_name: siem-source-tracker-app
    depends_on:
      mariadb-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    environment:
      # DOMAIN plane on MariaDB (mariadb:// protocol drives DB_PROVIDER=mariadb
      # automatically, src/lib/dbProvider.ts in the app repo) — the master
      # only, no read/write splitting.
      DATABASE_URL: mysql://siem:${MARIADB_PASSWORD:-siem_password}@mariadb-master:3306/siem_source_tracker
      # CONTROL plane fixed to the companion Postgres above (FR-43): its own
      # protocol (postgresql://) independently decides the control provider,
      # regardless of the domain plane's mysql:// above. Unlike the previous
      # all-Postgres topology this is not env-overridable — the whole point of
      # this topology is domain=MariaDB / control=Postgres on the services
      # defined in this file; edit the compose file directly for anything else.
      CONTROL_DATABASE_URL: postgresql://siem:${POSTGRES_PASSWORD:-siem_password}@postgres:5432/siem_source_tracker_control
      # Setup-wizard-ONLY hints (never read by the running app or Prisma CLI):
      # generic "here is a reachable Postgres/MariaDB server" candidates so the
      # control-plane wizard step can offer a "use containerized DB" default
      # for EITHER provider, not just CONTROL_DATABASE_URL's own (Postgres
      # above). The MariaDB one points at the siem_source_tracker_control
      # database that mariadb/init-master/01-init.sh already creates
      # (otherwise unused).
      DB_POSTGRES_URL: postgresql://siem:${POSTGRES_PASSWORD:-siem_password}@postgres:5432/siem_source_tracker_control
      DB_MARIADB_URL: mysql://siem:${MARIADB_PASSWORD:-siem_password}@mariadb-master:3306/siem_source_tracker_control
      # FR-42: the companion Postgres also stages legacy pg_dump restores
      # (pg_restore needs a real Postgres) — used solely for that, never for
      # anything else, now that the domain plane is MariaDB.
      RESTORE_PG_URL: postgresql://siem:${POSTGRES_PASSWORD:-siem_password}@postgres:5432/postgres
      # Optional cache (Redis). Remove to run without it — the app degrades to
      # direct DB reads.
      REDIS_URL: redis://redis:6379
      # Setup-wizard prefill ONLY ("use containerized SMTP" on the SMTP
      # step) — runtime mail config stays in the DB (SmtpServer rows,
      # /admin/smtp).
      SMTP_URL: smtp://mailhog:1025?from=noreply@siem-tracker.local
      APP_SECRET: ${APP_SECRET}
      TARGET_DATE: ${TARGET_DATE}
      # Public base URL used to build invite/reset links in emails. Behind nginx
      # this is the HTTPS origin, e.g. https://siem.example.local
      APP_URL: ${APP_URL}
      # Optional shared secret for the cron daily-snapshot endpoint (FR-14).
      SNAPSHOT_TOKEN: ${SNAPSHOT_TOKEN:-}
      # Reverse-proxy wiring: the wizard writes TLS artifacts and the generated
      # nginx config into these dirs, which are volumes shared with the nginx
      # container (see the header comment). NGINX_UPSTREAM is what the generated
      # config proxies to — the app service on the internal network.
      TLS_DIR: /app/tls
      NGINX_CONF_DIR: /app/nginx
      NGINX_UPSTREAM: app:3000
      # Where the admin log viewer (/admin/logs) reads nginx's access/error
      # logs — the nginx_logs volume, mounted read-only below.
      NGINX_LOG_DIR: /app/nginx-logs
      # Outbound egress proxy (FR-32): the app's outbound HTTP/HTTPS goes
      # through the squid service (see its header comment). NO_PROXY keeps
      # intra-stack HTTP direct. SQUID_LOG_DIR is where the admin log viewer
      # tails squid's logs — the squid_logs volume, mounted read-only below.
      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      NO_PROXY: localhost,127.0.0.1,mariadb-master,mariadb-slave1,mariadb-slave2,postgres,redis,mailhog,meilisearch,nginx,app,squid
      SQUID_LOG_DIR: /app/squid-logs
      # Search engine — provisioned by the `meilisearch` service below but NOT yet
      # wired into the app (no code reads these today). Uncomment when search lands.
      # MEILI_URL: http://meilisearch:7700
      # MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      # Connection registry (SQLite with AES-encrypted DB creds, FR-31) and
      # backups must survive container recreation, otherwise in-app DB switching
      # and uploaded backups are lost on every deploy.
      - app_data:/app/data
      - app_backups:/app/backups
      # Shared with nginx (see header). Deliberately OUTSIDE /app/data so the
      # registry (secrets) is never on a volume the nginx container mounts.
      - proxy_conf:/app/nginx
      - proxy_certs:/app/tls
      # Nginx's log files (see the nginx service), read-only: the admin log
      # viewer (/admin/logs) tails them straight from this volume.
      - nginx_logs:/app/nginx-logs:ro
      # Squid's log files (see the squid service), read-only — same contract.
      - squid_logs:/app/squid-logs:ro
      # Reserved for future file logging; the app logs to stdout today.
      - app_logs:/app/logs
    # No published ports — the app is reached only through nginx. The image's
    # HEALTHCHECK covers readiness. Migrations are NOT run on start (the one-shot
    # `migrate` service below handles them); a routine restart never touches the
    # schema. The app self-restarts via process.exit on /admin/restart, so the
    # `unless-stopped` policy is what brings it back.
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: siem-source-tracker-nginx
    depends_on:
      - app
    # Wait for the app entrypoint to seed the bootstrap config on first boot:
    # depends_on only orders container STARTS, so nginx could read the shared
    # volume before app.conf exists and come up with no server block. The wait
    # is milliseconds in practice.
    command: >
      sh -c 'while [ ! -f /etc/nginx/conf.d/app.conf ]; do sleep 0.3; done;
      exec nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config + certs come from the app (wizard-generated; app entrypoint seeds
      # a bootstrap HTTP config on first boot). Read-only on this side. `nocopy`
      # keeps the image's default.conf welcome page from seeding the shared
      # volume before the app writes the real config.
      - type: volume
        source: proxy_conf
        target: /etc/nginx/conf.d
        read_only: true
        volume:
          nocopy: true
      - type: volume
        source: proxy_certs
        target: /etc/nginx/certs
        read_only: true
        volume:
          nocopy: true
      # Mounting /var/log/nginx hides the image's stdout/stderr symlinks, so
      # access.log/error.log become real files persisted across recreation.
      - nginx_logs:/var/log/nginx
    restart: unless-stopped

  # One-shot schema migration. The `migrate` profile keeps it out of the normal
  # `up -d`; run it explicitly before bringing the app up/updating it. The
  # `migrate` argument is recognized by the image entrypoint (docker-entrypoint.sh)
  # and runs `prisma migrate deploy` on BOTH planes. It is idempotent. There is no
  # admin seed: a fresh install boots into the Initial Configuration Wizard
  # (/setup), which creates the first admin and can itself apply the schema — so
  # this job is optional (handy for pre-migrating a data-plane switch target).
  migrate:
    image: ngmaibulat/usiem-tracker:latest
    container_name: siem-source-tracker-migrate
    profiles: ["migrate"]
    depends_on:
      mariadb-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Same domain (MariaDB) + control (Postgres) connections the app uses
      # (see the `app` service) — prisma.config.ts picks the mysql schema/
      # migration tree automatically from the mysql:// protocol.
      DATABASE_URL: mysql://siem:${MARIADB_PASSWORD:-siem_password}@mariadb-master:3306/siem_source_tracker
      CONTROL_DATABASE_URL: postgresql://siem:${POSTGRES_PASSWORD:-siem_password}@postgres:5432/siem_source_tracker_control
    command: ["migrate"]
    restart: "no"

volumes:
  postgres_data:
  mariadb_master_data:
  mariadb_slave1_data:
  mariadb_slave2_data:
  redis_data:
  meili_data:
  app_data:
  app_backups:
  # app ⇄ nginx shared: generated config (app.conf) and TLS cert/key.
  proxy_conf:
  proxy_certs:
  nginx_logs:
  # squid ⇄ app shared: squid writes its access/cache logs, the app's admin
  # log viewer reads them (read-only).
  squid_logs:
  app_logs:
