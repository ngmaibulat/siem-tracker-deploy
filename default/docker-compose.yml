# Production / manual-QA stack for SIEM Source Tracker.
#
# Topology: nginx (TLS termination) → app → mariadb (DOMAIN plane: 1 master + 2
# async binlog/GTID replicas) + postgres (CONTROL plane: identity/auth/audit) +
# redis + squid + meilisearch + minio — mirroring the app repo's
# containers/default dev lab topology (see its docker-compose.yml header), but
# with every service pulled from a registry instead of built from source: the
# app runs the PUBLISHED image `ngmaibulat/usiem-tracker:latest` (publicly
# pullable, no login), and MariaDB/Postgres/Redis/Squid/MinIO are all
# stock upstream images — this file never builds anything. Only nginx publishes
# ports (80/443); the app, MariaDB, Postgres, Redis and Meilisearch stay on the
# internal compose network only. Unlike the app repo's dev lab, there is no
# MailHog here — this is the prod-shaped lab, so outbound mail must be a real
# SMTP server configured via the Initial Configuration Wizard or /admin/smtp.
# Versioned app image tags (vX.Y.Z) exist in the registry for rollback — see
# the rollback section in DEPLOY.md.
#
# Nginx config + certs are GENERATED BY THE APP (Initial Configuration Wizard)
# and shared through named volumes: the app writes into /app/nginx (proxy_conf)
# and /app/tls (proxy_certs); nginx reads the same volumes at /etc/nginx/conf.d
# and /etc/nginx/certs. On first boot the app's entrypoint seeds a bootstrap
# HTTP-only config so the wizard is reachable on port 80 before any certificate
# exists; once the wizard has generated the real config + cert, apply them with:
#
#   docker compose exec nginx nginx -s reload
#
# Run from this folder — it's the default `docker-compose.yml`, so no -f flag:
#
#   cd <repo-root>
#   # pull the pinned image (optional — `run`/`up` pull it if missing):
#   docker compose pull
#   # bring the stack up — the app applies its own pending schema migrations
#   # at startup, before it starts serving traffic (FR-47, registry-targeted,
#   # advisory-lock protected; opt out with AUTO_MIGRATE=off):
#   docker compose up -d
#
# Required .env keys: APP_SECRET, APP_URL, TARGET_DATE, MEILI_MASTER_KEY.
# Optional: SNAPSHOT_TOKEN (enables the cron snapshot endpoint),
# POSTGRES_PASSWORD, MARIADB_ROOT_PASSWORD, MARIADB_PASSWORD, MARIADB_REPL_PASSWORD,
# MINIO_ROOT_PASSWORD.
# See example.env in this folder.

services:
  # Intended to host the CONTROL plane in this topology (identity/auth/audit).
  # The DOMAIN plane lives on MariaDB (mariadb-master, below), a live example
  # of the two planes running on independent providers (FR-43 in the app
  # repo) — but which plane
  # actually uses which provider at RUNTIME is a wizard choice, not fixed by
  # this file (see the app repo's CLAUDE.md, Connection registry section): the
  # operator just needs to tick "use containerized DB" for each plane's step to
  # match this topology, or pick something else. Also doubles as the FR-42
  # restore-helper (RESTORE_PG_URL) for legacy pg_dump restores.
  # NOTE: POSTGRES_DB only takes effect on a fresh/empty postgres_data volume —
  # if this compose file is applied to an ALREADY-INITIALIZED postgres_data
  # volume from an older release (which used `siem_source_tracker_control` as
  # the database name), this rename has no effect on the existing database;
  # migrate a fresh volume or rename the DB by hand.
  postgres:
    image: postgres:18
    container_name: siem-source-tracker-postgres
    environment:
      POSTGRES_DB: siem_source_tracker
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siem_password}
    volumes:
      # Postgres 18+ stores data in a major-version subdir; mount the parent dir
      # (not .../data) per the official image convention. See the pg-major-upgrade
      # warning in DEPLOY.md before bumping this image tag on an existing volume.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem -d siem_source_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # DOMAIN plane: classic async (binlog/GTID) MariaDB replication — 1 master +
  # 2 slaves. The app's DB_MARIADB_URL points only at the master (no
  # read/write-split logic); the slaves exist for QA to inspect replication
  # behavior via `docker compose exec mariadb-slave1 ...`. No ports published
  # (unlike the app repo's dev lab, which exposes 3326-3328 for convenience) —
  # this repo's convention is that only nginx is reachable from outside the
  # compose network.
  mariadb-master:
    # 13.1 is preview-only (no GA / official Docker Hub tag yet) — pulled from
    # the MariaDB Foundation's devel registry; re-pin to `mariadb:13.1.x` on GA.
    image: quay.io/mariadb-foundation/mariadb-devel:13.1-preview
    container_name: siem-source-tracker-mariadb-master
    environment:
      # Upgrade system tables in place when the volume was initialized by an
      # older major version (no-op on fresh volumes).
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb_root_password}
      MARIADB_DATABASE: siem_source_tracker
      MARIADB_USER: siem
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-siem_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    entrypoint:
      - sh
      - -c
      - exec docker-entrypoint.sh mariadbd --server-id=1
    volumes:
      - ./mariadb/replication.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - ./mariadb/init-master:/docker-entrypoint-initdb.d:ro
      - mariadb_master_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # Replication wiring below is a SHELL command in the entrypoint, not SQL —
  # docker-entrypoint-initdb.d only runs once, before the master is reachable
  # over the network, and never reruns on a plain restart. The backgrounded
  # subshell instead retries until the master is actually usable, then
  # re-issues CHANGE MASTER TO / START SLAVE until BOTH slave threads report
  # Running (START SLAVE can fail without its own retry, e.g. IO error 1236
  # when the master's binlog doesn't hold the requested GTID yet) —
  # safe/idempotent to rerun on every container start since GTID position
  # persists in the volume.
  mariadb-slave1:
    image: quay.io/mariadb-foundation/mariadb-devel:13.1-preview
    container_name: siem-source-tracker-mariadb-slave1
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb_root_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    depends_on:
      mariadb-master:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - >-
        (
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -hmariadb-master -urepl -p"$$MARIADB_REPL_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e "STOP SLAVE; CHANGE MASTER TO MASTER_HOST='mariadb-master', MASTER_USER='repl', MASTER_PASSWORD='$$MARIADB_REPL_PASSWORD', MASTER_USE_GTID=slave_pos; START SLAVE;" &&
        sleep 3 &&
        [ "$$(mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SHOW SLAVE STATUS\G' 2>/dev/null | grep -Ec 'Slave_(IO|SQL)_Running: Yes')" = 2 ];
        do sleep 5; done
        ) &
        exec docker-entrypoint.sh mariadbd --server-id=2
    volumes:
      - ./mariadb/replication.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - mariadb_slave1_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mariadb-slave2:
    image: quay.io/mariadb-foundation/mariadb-devel:13.1-preview
    container_name: siem-source-tracker-mariadb-slave2
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb_root_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    depends_on:
      mariadb-master:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - >-
        (
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -hmariadb-master -urepl -p"$$MARIADB_REPL_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e "STOP SLAVE; CHANGE MASTER TO MASTER_HOST='mariadb-master', MASTER_USER='repl', MASTER_PASSWORD='$$MARIADB_REPL_PASSWORD', MASTER_USE_GTID=slave_pos; START SLAVE;" &&
        sleep 3 &&
        [ "$$(mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SHOW SLAVE STATUS\G' 2>/dev/null | grep -Ec 'Slave_(IO|SQL)_Running: Yes')" = 2 ];
        do sleep 5; done
        ) &
        exec docker-entrypoint.sh mariadbd --server-id=3
    volumes:
      - ./mariadb/replication.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - mariadb_slave2_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: siem-source-tracker-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Outbound egress proxy (FR-32). All outbound HTTP/HTTPS from the app
  # (Telegram, endpoint health probes, npm update checks, holiday import) is
  # routed through it via HTTP_PROXY/HTTPS_PROXY on the app service, so its
  # access.log collects realistic proxy-traffic samples; the admin log viewer
  # (/admin/logs) tails them from the shared squid_logs volume. HTTPS appears
  # as `CONNECT host:443` tunnel lines — expected without SSL bump. Optional:
  # the app degrades gracefully when squid is down (nothing depends on it).
  squid:
    image: ubuntu/squid:latest
    container_name: siem-source-tracker-squid
    # Pre-create the log files world-readable: squid's own 0640 would hide
    # them from the app container reading the shared volume. Must replace the
    # image ENTRYPOINT (which would pass these args to squid).
    entrypoint:
      - sh
      - -c
      - >-
        touch /var/log/squid/access.log /var/log/squid/cache.log &&
        chown -R proxy:proxy /var/log/squid && chmod 755 /var/log/squid &&
        chmod 644 /var/log/squid/*.log &&
        exec squid -f /etc/squid/squid.conf -N
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - squid_logs:/var/log/squid
    restart: unless-stopped

  # Search engine: full-text search over source comments and feature requests
  # (wired via MEILI_URL/MEILI_MASTER_KEY on the app service). Optional
  # accelerator — deliberately no `depends_on`: when it's down/unreachable the
  # app transparently falls back to a DB substring match. Internal-only:
  # reachable on the compose network as meilisearch:7700, never published.
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: siem-source-tracker-meilisearch
    environment:
      # MEILI_ENV=production refuses to start without a master key >= 16 bytes.
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      # getmeili images ship wget (busybox); if a future tag drops it, this check
      # can be removed — nothing depends_on meilisearch, so it's only informational.
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # S3-compatible object storage for uploaded rich-text images (optional
  # accelerator posture like redis/meilisearch: the app treats "S3_ENDPOINT
  # unset" or "minio down" as uploads-disabled, never a crash). Internal-only:
  # reachable on the compose network as minio:9000, never published. The app
  # auto-creates the bucket on first upload — no mc init sidecar.
  minio:
    image: minio/minio:latest
    container_name: siem-source-tracker-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: siem_minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-siem_minio_password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ngmaibulat/usiem-tracker:latest
    container_name: siem-source-tracker-app
    depends_on:
      mariadb-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      # The only two DB-connection env vars the app reads (see the app repo's
      # CLAUDE.md, Environment section): one reachable Postgres server, one
      # reachable MariaDB server, each a base database. Neither one alone
      # decides which plane uses which provider — that's a choice made once,
      # in the browser, by the Initial Configuration Wizard, and stored in the
      # connection registry; these vars only seed its "use containerized DB"
      # shortcut for EITHER plane. They're never read again once a connection
      # is saved — no plane can be silently overridden by the environment.
      DB_POSTGRES_URL: postgresql://siem:${POSTGRES_PASSWORD:-siem_password}@postgres:5432/siem_source_tracker
      DB_MARIADB_URL: mysql://siem:${MARIADB_PASSWORD:-siem_password}@mariadb-master:3306/siem_source_tracker
      # FR-42: the companion Postgres also stages legacy pg_dump restores
      # (pg_restore needs a real Postgres) — used solely for that, never for
      # anything else.
      RESTORE_PG_URL: postgresql://siem:${POSTGRES_PASSWORD:-siem_password}@postgres:5432/postgres
      # Optional cache (Redis). Remove to run without it — the app degrades to
      # direct DB reads.
      REDIS_URL: redis://redis:6379
      # No SMTP_URL here — unlike the app repo's dev lab (which prefills the
      # wizard's SMTP step with a MailHog catch-all), this prod-shaped lab has
      # no fake mail catcher. Configure a real SMTP server via the Initial
      # Configuration Wizard or /admin/smtp; mail config lives in the DB
      # (SmtpServer rows), never in this env var.
      APP_SECRET: ${APP_SECRET}
      TARGET_DATE: ${TARGET_DATE}
      # Public base URL used to build invite/reset links in emails. Behind nginx
      # this is the HTTPS origin, e.g. https://siem.example.local
      APP_URL: ${APP_URL}
      # Optional shared secret for the cron daily-snapshot endpoint (FR-14).
      SNAPSHOT_TOKEN: ${SNAPSHOT_TOKEN:-}
      # Optional shared secret the external scheduler service (FR-46, below)
      # authenticates with; /api/scheduler/config answers 503 while unset.
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-}
      # Pin the SQLite connection registry (FR-31 — holds the plane connections
      # AND the wizard-generated APP_SECRET) onto the app_data volume
      # explicitly: the code default is cwd-relative, and losing this file
      # orphans everything encrypted with the lost secret. Also baked into the
      # image as ENV; kept here so the contract is visible in the compose file.
      REGISTRY_DB_PATH: /app/data/registry.sqlite
      # Reverse-proxy wiring: the wizard writes TLS artifacts and the generated
      # nginx config into these dirs, which are volumes shared with the nginx
      # container (see the header comment). NGINX_UPSTREAM is what the generated
      # config proxies to — the app service on the internal network.
      TLS_DIR: /app/tls
      NGINX_CONF_DIR: /app/nginx
      NGINX_UPSTREAM: app:3000
      # Where the admin log viewer (/admin/logs) reads nginx's access/error
      # logs — the nginx_logs volume, mounted read-only below.
      NGINX_LOG_DIR: /app/nginx-logs
      # Outbound egress proxy (FR-32): the app's outbound HTTP/HTTPS goes
      # through the squid service (see its header comment). NO_PROXY keeps
      # intra-stack HTTP direct. SQUID_LOG_DIR is where the admin log viewer
      # tails squid's logs — the squid_logs volume, mounted read-only below.
      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      NO_PROXY: localhost,127.0.0.1,mariadb-master,mariadb-slave1,mariadb-slave2,postgres,redis,meilisearch,minio,nginx,app,squid
      SQUID_LOG_DIR: /app/squid-logs
      # Search engine: full-text search over source comments and feature
      # requests (the app falls back to a DB substring match when these are
      # unset or Meilisearch is unreachable). After first enabling on an
      # existing install — or after restoring a backup — run "Reindex now" at
      # /admin/search to index pre-existing content.
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      # S3-compatible object storage for uploaded rich-text images (optional —
      # unset ⇒ image paste-upload disabled, editor still works). Matches the
      # minio service above; the bucket is auto-created on first upload.
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: siem_minio
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-siem_minio_password}
      S3_BUCKET: siem-files
    volumes:
      # Connection registry (SQLite with AES-encrypted DB creds, FR-31) and
      # backups must survive container recreation, otherwise in-app DB switching
      # and uploaded backups are lost on every deploy.
      - app_data:/app/data
      - app_backups:/app/backups
      # Shared with nginx (see header). Deliberately OUTSIDE /app/data so the
      # registry (secrets) is never on a volume the nginx container mounts.
      - proxy_conf:/app/nginx
      - proxy_certs:/app/tls
      # Nginx's log files (see the nginx service), read-only: the admin log
      # viewer (/admin/logs) tails them straight from this volume.
      - nginx_logs:/app/nginx-logs:ro
      # Squid's log files (see the squid service), read-only — same contract.
      - squid_logs:/app/squid-logs:ro
      # Reserved for future file logging; the app logs to stdout today.
      - app_logs:/app/logs
    # No published ports — the app is reached only through nginx. The image's
    # HEALTHCHECK covers readiness. The app applies its own pending migrations
    # at every start (FR-47): registry-resolved connections (both planes),
    # advisory-lock protected against concurrent starts, opt out with
    # AUTO_MIGRATE=off. The app self-restarts via process.exit on
    # /admin/restart, so the `unless-stopped` policy is what brings it back.
    restart: unless-stopped

  # External scheduler service (FR-46): a thin Bun trigger that polls the app's
  # /api/scheduler/config and fires due jobs (scheduled report delivery) via
  # /api/scheduler/run. It holds NO business logic, DB access, or SMTP
  # credentials — everything runs inside the app. Requires SCHEDULER_TOKEN in
  # .env (must match the app service's copy above); when the token is unset the
  # container exits immediately and `unless-stopped` respawns it in a loop, so
  # comment this service out if you don't use scheduled report delivery.
  scheduler:
    image: ngmaibulat/usiem-scheduler:latest
    container_name: siem-source-tracker-scheduler
    depends_on:
      app:
        condition: service_started
    environment:
      APP_INTERNAL_URL: http://app:3000
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: siem-source-tracker-nginx
    depends_on:
      - app
    # Wait for the app entrypoint to seed the bootstrap config on first boot:
    # depends_on only orders container STARTS, so nginx could read the shared
    # volume before app.conf exists and come up with no server block. The wait
    # is milliseconds in practice.
    command: >
      sh -c 'while [ ! -f /etc/nginx/conf.d/app.conf ]; do sleep 0.3; done;
      exec nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config + certs come from the app (wizard-generated; app entrypoint seeds
      # a bootstrap HTTP config on first boot). Read-only on this side. `nocopy`
      # keeps the image's default.conf welcome page from seeding the shared
      # volume before the app writes the real config.
      - type: volume
        source: proxy_conf
        target: /etc/nginx/conf.d
        read_only: true
        volume:
          nocopy: true
      - type: volume
        source: proxy_certs
        target: /etc/nginx/certs
        read_only: true
        volume:
          nocopy: true
      # Mounting /var/log/nginx hides the image's stdout/stderr symlinks, so
      # access.log/error.log become real files persisted across recreation.
      - nginx_logs:/var/log/nginx
    restart: unless-stopped

volumes:
  postgres_data:
  mariadb_master_data:
  mariadb_slave1_data:
  mariadb_slave2_data:
  redis_data:
  meili_data:
  minio_data:
  app_data:
  app_backups:
  # app ⇄ nginx shared: generated config (app.conf) and TLS cert/key.
  proxy_conf:
  proxy_certs:
  nginx_logs:
  # squid ⇄ app shared: squid writes its access/cache logs, the app's admin
  # log viewer reads them (read-only).
  squid_logs:
  app_logs:
