# Manual-QA lab: the siem-tracker app running against a 3-node MariaDB Galera
# cluster. Mirrors the app repo's containers/mariadb-galera dev lab in
# topology (minus its MaxScale proxy — removed here; the app connects to the
# cluster directly), with every service a PULLED registry image
# (ngmaibulat/usiem-tracker:latest for the app, stock upstream images for
# everything else) — this file never builds. The app's DB_MARIADB_URL points
# at node1 (any node would do — Galera is multi-master); node2/3 are cluster
# peers the app never talks to directly. nginx fronts the app
# on host 80/443 as the ONLY web entry point (the app publishes no ports;
# config + TLS are wizard-generated, same volume wiring as ../default). No
# squid and no separate control-plane Postgres candidate here
# (DB-topology-focused, not fully prod-shaped) — see ../default for that. No
# MailHog either — real SMTP only, configured via the wizard or /admin/smtp.
# Own DB/minio ports and volumes, but NOTE: every lab's nginx binds host
# 80/443, so only one lab (default included) can be up at a time.
#
# Bring up (from this directory):
#   mkdir -p data/mariadb-logs
#   cp example.env .env && docker compose pull && docker compose up -d
# App: http://localhost (bootstrap config) / https://localhost (after the
# wizard)
# Project name must NOT collide with the app repo's dev lab (which uses
# `mariadb-galera-lab`): volumes are project-scoped, so a shared name makes
# the two stacks silently share — and `down -v` mutually destroy — each
# other's data volumes on a machine that has both repos checked out.
name: siem-tracker-galera

services:
  app:
    image: ngmaibulat/usiem-tracker:latest
    container_name: siem-tracker-galera-app
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      # No depends_on on the mariadb nodes directly: they take much longer to
      # become usable than "started", and the app's own `restart:
      # unless-stopped` + startup check already retries until the DB answers.
      # The app applies its own pending migrations at startup (FR-47), so it
      # doesn't need the cluster reachable before its own process starts —
      # only before the migration step inside it runs.
    environment:
      # The only DB-connection env var this lab sets — no DB_POSTGRES_URL, so
      # the wizard's "use containerized DB" shortcut is MariaDB-only here,
      # keeping this lab focused on its own Galera topology. The app only ever
      # talks to node1. The control plane, if assigned MariaDB, derives
      # its own `<base>_control` database (created by init/01-init.sh).
      DB_MARIADB_URL: mysql://siem:${MARIADB_PASSWORD:-siem_password}@mariadb-node1:3306/siem_source_tracker
      REDIS_URL: redis://redis:6379
      # No SMTP_URL / MailHog here — configure a real SMTP server via the
      # wizard or /admin/smtp; mail config lives in the DB, never in this env.
      APP_SECRET: ${APP_SECRET}
      # Public base URL (invite/reset links). Behind nginx; override in .env
      # when serving on a real hostname.
      APP_URL: ${APP_URL:-http://localhost}
      TARGET_DATE: ${TARGET_DATE:-2026-12-31}
      # Optional shared secret the external scheduler service (FR-46, below)
      # authenticates with; /api/scheduler/config answers 503 while unset.
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-}
      # Pin the SQLite connection registry (FR-31 — holds the plane connections
      # AND the wizard-generated APP_SECRET) onto the app_data volume
      # explicitly: the code default is cwd-relative, and losing this file
      # orphans everything encrypted with the lost secret. Also baked into the
      # image as ENV; kept here so the contract is visible in the compose file.
      REGISTRY_DB_PATH: /app/data/registry.sqlite
      # /admin/logs tabs mariadb-node1..3 read from this — see
      # src/lib/serverLogs.ts. Bind-mounted below from the same host dir the
      # mariadb services write into.
      MARIADB_LOG_DIR: /app/mariadb-logs
      # FR-42 restore-helper only (pg_restore needs a real Postgres to stage
      # into) — not offered as a DB_POSTGRES_URL wizard candidate by default here.
      RESTORE_PG_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/postgres
      # Reverse-proxy wiring (same as ../default): the wizard writes TLS
      # artifacts and the generated nginx config into these dirs — volumes
      # shared with the nginx container; the app's entrypoint seeds a
      # bootstrap HTTP config on first boot. NGINX_LOG_DIR is where the admin
      # log viewer (/admin/logs) tails nginx's access/error logs.
      TLS_DIR: /app/tls
      NGINX_CONF_DIR: /app/nginx
      NGINX_UPSTREAM: app:3000
      NGINX_LOG_DIR: /app/nginx-logs
      # S3-compatible object storage for uploaded rich-text images (optional —
      # unset ⇒ image paste-upload disabled, editor still works). Matches the
      # minio service below; the bucket is auto-created on first upload.
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: siem_minio
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-siem_minio_password}
      S3_BUCKET: siem-files
    volumes:
      - ./data/mariadb-logs:/app/mariadb-logs:ro
      # Connection registry (SQLite, FR-31 — holds the plane connections AND
      # the wizard-generated APP_SECRET) + uploaded backups must survive
      # container recreation: without these volumes every `pull` + `up -d`
      # image update wipes the registry and orphans everything encrypted with
      # the lost secret. Same contract as ../default.
      - app_data:/app/data
      - app_backups:/app/backups
      # Shared with nginx (wizard-generated config + certs). Deliberately
      # OUTSIDE /app/data so the registry (secrets) is never on a volume the
      # nginx container mounts.
      - proxy_conf:/app/nginx
      - proxy_certs:/app/tls
      # Nginx's log files, read-only — the admin log viewer tails them.
      - nginx_logs:/app/nginx-logs:ro
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: siem-tracker-galera-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # S3-compatible object storage for uploaded rich-text images (optional
  # accelerator posture like redis: the app treats "S3_ENDPOINT unset" or
  # "minio down" as uploads-disabled, never a crash). Internal-only: reachable
  # on the compose network as minio:9000, never published. The app
  # auto-creates the bucket on first upload — no mc init sidecar.
  minio:
    image: minio/minio:latest
    container_name: siem-tracker-galera-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: siem_minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-siem_minio_password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Topology: 3 mariadb nodes replicate via Galera (config ./galera.cnf).
  # node1 bootstraps the cluster when its grastate.dat is absent (fresh
  # volume) or marked safe_to_bootstrap — node2/3 depend on node1, so a
  # graceful `down` stops node1 LAST and leaves it safe to bootstrap. After an
  # UNGRACEFUL full-stack kill all nodes may hold safe_to_bootstrap: 0; recover
  # by starting node1 once with the flag forced:
  #   docker compose run --rm mariadb-node1 sh -c \
  #     "sed -i 's/safe_to_bootstrap: 0/safe_to_bootstrap: 1/' /var/lib/mysql/grastate.dat" \
  #   && docker compose up -d
  mariadb-node1:
    # NOT 13.1 like the other labs: no current 13.1 build (preview or rolling,
    # any variant) ships a working Galera provider library or rsync for SST —
    # 13.0.1-rc is the closest 13.x that does, at the same provider path
    # galera.cnf already points at. Re-pin to 13.1 once a Galera-capable
    # build exists.
    image: mariadb:13.0.1-rc
    container_name: siem-tracker-galera-node1
    environment:
      # Upgrade system tables in place when the volume was initialized by an
      # older major version (no-op on fresh volumes).
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: siem_source_tracker
      MARIADB_USER: siem
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-siem_password}
    entrypoint:
      - sh
      - -c
      - >-
        touch /var/log/mysql/node1.err &&
        chown mysql:mysql /var/log/mysql/node1.err &&
        chmod 755 /var/log/mysql && chmod 644 /var/log/mysql/node1.err;
        BOOT="";
        if [ ! -f /var/lib/mysql/grastate.dat ] ||
        grep -q "safe_to_bootstrap: 1" /var/lib/mysql/grastate.dat;
        then BOOT=--wsrep-new-cluster; fi;
        exec docker-entrypoint.sh mariadbd $$BOOT
        --wsrep_node_name=node1 --wsrep_node_address=mariadb-node1
        --log_error=/var/log/mysql/node1.err
    ports:
      - "3346:3306"
    volumes:
      - ./galera.cnf:/etc/mysql/conf.d/galera.cnf:ro
      # Runs once on a fresh volume (bootstrap node only): creates the control
      # database and a lab_demo sandbox database; replicated to the others.
      - ./init:/docker-entrypoint-initdb.d:ro
      - node1_data:/var/lib/mysql
      - ./data/mariadb-logs:/var/log/mysql
    healthcheck:
      # Root credentials, not the image's healthcheck.sh: SST overwrites the
      # joiners' mysql.user with the donor's, orphaning their locally generated
      # healthcheck@localhost passwords. Root's password is identical
      # cluster-wide and survives SST. A non-synced galera node rejects
      # queries, so `SELECT 1` doubles as a synced-check.
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mariadb-node2:
    image: mariadb:13.0.1-rc
    container_name: siem-tracker-galera-node2
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
    entrypoint:
      - sh
      - -c
      - >-
        touch /var/log/mysql/node2.err &&
        chown mysql:mysql /var/log/mysql/node2.err &&
        chmod 755 /var/log/mysql && chmod 644 /var/log/mysql/node2.err;
        exec docker-entrypoint.sh mariadbd
        --wsrep_node_name=node2 --wsrep_node_address=mariadb-node2
        --log_error=/var/log/mysql/node2.err
    ports:
      - "3347:3306"
    volumes:
      - ./galera.cnf:/etc/mysql/conf.d/galera.cnf:ro
      - node2_data:/var/lib/mysql
      - ./data/mariadb-logs:/var/log/mysql
    depends_on:
      mariadb-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mariadb-node3:
    image: mariadb:13.0.1-rc
    container_name: siem-tracker-galera-node3
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
    entrypoint:
      - sh
      - -c
      - >-
        touch /var/log/mysql/node3.err &&
        chown mysql:mysql /var/log/mysql/node3.err &&
        chmod 755 /var/log/mysql && chmod 644 /var/log/mysql/node3.err;
        exec docker-entrypoint.sh mariadbd
        --wsrep_node_name=node3 --wsrep_node_address=mariadb-node3
        --log_error=/var/log/mysql/node3.err
    ports:
      - "3348:3306"
    volumes:
      - ./galera.cnf:/etc/mysql/conf.d/galera.cnf:ro
      - node3_data:/var/lib/mysql
      - ./data/mariadb-logs:/var/log/mysql
    depends_on:
      mariadb-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # FR-42/43 restore-helper: NOT part of the app's normal data path — used only
  # to stage legacy pg_dump restores (pg_restore's temp database) before
  # porting the data into the MariaDB cluster.
  postgres:
    image: postgres:18
    container_name: siem-tracker-galera-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # External scheduler service (FR-46): a thin Bun trigger that polls the app's
  # /api/scheduler/config and fires due jobs (scheduled report delivery) via
  # /api/scheduler/run. It holds NO business logic, DB access, or SMTP
  # credentials — everything runs inside the app. Requires SCHEDULER_TOKEN in
  # .env (must match the app service's copy above); when the token is unset the
  # container exits immediately and `unless-stopped` respawns it in a loop, so
  # comment this service out if you don't use scheduled report delivery.
  scheduler:
    image: ngmaibulat/usiem-scheduler:latest
    container_name: siem-tracker-galera-scheduler
    depends_on:
      app:
        condition: service_started
    environment:
      APP_INTERNAL_URL: http://app:3000
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-}
    restart: unless-stopped

  # Reverse proxy, mirroring ../default: the ONLY web entry point (the app
  # publishes no ports). Serves the entrypoint-seeded bootstrap HTTP config
  # until the setup wizard generates the real one (+ TLS) into the shared
  # volumes; after the wizard, apply the new config with:
  #
  #   docker compose exec nginx nginx -s reload
  #
  # NOTE: every lab's nginx binds host 80/443, so only one lab (default
  # included) can be up at a time.
  nginx:
    image: nginx:alpine
    container_name: siem-tracker-galera-nginx
    depends_on:
      - app
    # Wait for the app entrypoint to seed the bootstrap config on first boot:
    # depends_on only orders container STARTS, so nginx could read the shared
    # volume before app.conf exists and come up with no server block. The wait
    # is milliseconds in practice.
    command: >
      sh -c 'while [ ! -f /etc/nginx/conf.d/app.conf ]; do sleep 0.3; done;
      exec nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config + certs come from the app (wizard-generated; app entrypoint
      # seeds a bootstrap HTTP config on first boot). Read-only on this side.
      # `nocopy` keeps the image's default.conf welcome page from seeding the
      # shared volume before the app writes the real config.
      - type: volume
        source: proxy_conf
        target: /etc/nginx/conf.d
        read_only: true
        volume:
          nocopy: true
      - type: volume
        source: proxy_certs
        target: /etc/nginx/certs
        read_only: true
        volume:
          nocopy: true
      # Mounting /var/log/nginx hides the image's stdout/stderr symlinks, so
      # access.log/error.log become real files persisted across recreation.
      - nginx_logs:/var/log/nginx
    restart: unless-stopped

volumes:
  node1_data:
  node2_data:
  node3_data:
  postgres_data:
  redis_data:
  minio_data:
  app_data:
  app_backups:
  # app ⇄ nginx shared: generated config (app.conf) and TLS cert/key.
  proxy_conf:
  proxy_certs:
  nginx_logs:
