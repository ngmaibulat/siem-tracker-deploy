# Manual-QA lab: the siem-tracker app running against a 2-node MariaDB
# circular ("multi-master") replication topology using classic binlog/GTID
# replication — NOT Galera (see ../mariadb-galera for the certification-based
# multi-master lab). Mirrors the app repo's containers/mariadb-multimaster dev
# lab exactly in topology, but every service here is a PULLED registry image
# (ngmaibulat/usiem-tracker:latest for the app, stock upstream images for
# everything else) — this file never builds. The app's DB_MARIADB_URL points
# only at node1; node2 is a replication peer the app never talks to directly.
# nginx fronts the app on host 80/443 as the ONLY web entry point (the app
# publishes no ports; config + TLS are wizard-generated, same volume wiring
# as ../default). No squid and no separate control-plane Postgres candidate
# here (DB-topology-focused, not fully prod-shaped) — see ../default for
# that. No MailHog either — real SMTP only, configured via the wizard or
# /admin/smtp. Own DB/minio ports and volumes, but NOTE: every lab's nginx
# binds host 80/443, so only one lab (default included) can be up at a time.
#
# Bring up (from this directory):
#   cp example.env .env && docker compose pull && docker compose up -d
# App: http://localhost (bootstrap config) / https://localhost (after the wizard)
# Project name must NOT collide with the app repo's dev lab (which uses
# `mariadb-multimaster-lab`): volumes are project-scoped, so a shared name
# makes the two stacks silently share — and `down -v` mutually destroy —
# each other's data volumes on a machine that has both repos checked out.
name: siem-tracker-multimaster

services:
  app:
    image: ngmaibulat/usiem-tracker:latest
    container_name: siem-tracker-multimaster-app
    depends_on:
      mariadb-node1:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      # The only DB-connection env var this lab sets — no DB_POSTGRES_URL, so
      # the wizard's "use containerized DB" shortcut is MariaDB-only here,
      # keeping this lab focused on its own multi-master replication topology,
      # same as the source dev lab. No read/write splitting — the app only
      # ever talks to node1. The control plane, if assigned MariaDB, derives
      # its own `<base>_control` database (created by mariadb/init/01-init.sh).
      DB_MARIADB_URL: mysql://siem:${MARIADB_PASSWORD:-siem_password}@mariadb-node1:3306/siem_source_tracker
      REDIS_URL: redis://redis:6379
      # No SMTP_URL / MailHog here — configure a real SMTP server via the
      # wizard or /admin/smtp; mail config lives in the DB, never in this env.
      APP_SECRET: ${APP_SECRET}
      # Public base URL (invite/reset links). Behind nginx; override in .env
      # when serving on a real hostname.
      APP_URL: ${APP_URL:-http://localhost}
      TARGET_DATE: ${TARGET_DATE:-2026-12-31}
      # Optional shared secret the external scheduler service (FR-46, below)
      # authenticates with; /api/scheduler/config answers 503 while unset.
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-}
      # Pin the SQLite connection registry (FR-31 — holds the plane connections
      # AND the wizard-generated APP_SECRET) onto the app_data volume
      # explicitly: the code default is cwd-relative, and losing this file
      # orphans everything encrypted with the lost secret. Also baked into the
      # image as ENV; kept here so the contract is visible in the compose file.
      REGISTRY_DB_PATH: /app/data/registry.sqlite
      # FR-42 restore-helper only (pg_restore needs a real Postgres to stage
      # into) — not offered as a DB_POSTGRES_URL wizard candidate by default here.
      RESTORE_PG_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/postgres
      # Reverse-proxy wiring (same as ../default): the wizard writes TLS
      # artifacts and the generated nginx config into these dirs — volumes
      # shared with the nginx container; the app's entrypoint seeds a
      # bootstrap HTTP config on first boot. NGINX_LOG_DIR is where the admin
      # log viewer (/admin/logs) tails nginx's access/error logs.
      TLS_DIR: /app/tls
      NGINX_CONF_DIR: /app/nginx
      NGINX_UPSTREAM: app:3000
      NGINX_LOG_DIR: /app/nginx-logs
      # S3-compatible object storage for uploaded rich-text images (optional —
      # unset ⇒ image paste-upload disabled, editor still works). Matches the
      # minio service below; the bucket is auto-created on first upload.
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: siem_minio
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-siem_minio_password}
      S3_BUCKET: siem-files
    volumes:
      # Connection registry (SQLite, FR-31 — holds the plane connections AND
      # the wizard-generated APP_SECRET) + uploaded backups must survive
      # container recreation: without these volumes every `pull` + `up -d`
      # image update wipes the registry and orphans everything encrypted with
      # the lost secret. Same contract as ../default.
      - app_data:/app/data
      - app_backups:/app/backups
      # Shared with nginx (wizard-generated config + certs). Deliberately
      # OUTSIDE /app/data so the registry (secrets) is never on a volume the
      # nginx container mounts.
      - proxy_conf:/app/nginx
      - proxy_certs:/app/tls
      # Nginx's log files, read-only — the admin log viewer tails them.
      - nginx_logs:/app/nginx-logs:ro
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: siem-tracker-multimaster-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # S3-compatible object storage for uploaded rich-text images (optional
  # accelerator posture like redis: the app treats "S3_ENDPOINT unset" or
  # "minio down" as uploads-disabled, never a crash). Internal-only: reachable
  # on the compose network as minio:9000, never published. The app
  # auto-creates the bucket on first upload — no mc init sidecar.
  minio:
    image: minio/minio:latest
    container_name: siem-tracker-multimaster-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: siem_minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-siem_minio_password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NOTE: node1 and node2 deliberately have NO depends_on relationship between
  # each other — a mutual `service_healthy` condition would be a dependency
  # cycle, which Compose rejects. Correctness comes entirely from each node's
  # own retry loop below, independent of container start order. The loop
  # re-issues CHANGE MASTER/START SLAVE until BOTH slave threads report
  # Running: on a fresh install a node can request its own GTIDs from a peer
  # that hasn't replicated them yet (IO error 1236, e.g. node1 after the app's
  # own FR-47 auto-migrate wrote schema to it before node2 caught up), and
  # START SLAVE never retries that by itself.
  mariadb-node1:
    # 13.1 is preview-only (no GA / official Docker Hub tag yet) — pulled from
    # the MariaDB Foundation's devel registry; re-pin to `mariadb:13.1.x` on GA.
    image: quay.io/mariadb-foundation/mariadb-devel:13.1-preview
    container_name: siem-tracker-multimaster-node1
    environment:
      # Upgrade system tables in place when the volume was initialized by an
      # older major version (no-op on fresh volumes).
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: siem_source_tracker
      MARIADB_USER: siem
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-siem_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    entrypoint:
      - sh
      - -c
      - >-
        (
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -hmariadb-node2 -urepl -p"$$MARIADB_REPL_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e "STOP SLAVE; CHANGE MASTER TO MASTER_HOST='mariadb-node2', MASTER_USER='repl', MASTER_PASSWORD='$$MARIADB_REPL_PASSWORD', MASTER_USE_GTID=current_pos; START SLAVE;" &&
        sleep 3 &&
        [ "$$(mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SHOW SLAVE STATUS\G' 2>/dev/null | grep -Ec 'Slave_(IO|SQL)_Running: Yes')" = 2 ];
        do sleep 5; done
        ) &
        exec docker-entrypoint.sh mariadbd --server-id=1 --auto-increment-offset=1
    ports:
      - "3336:3306"
    volumes:
      - ./mariadb/multimaster.cnf:/etc/mysql/conf.d/multimaster.cnf:ro
      # Only node1 owns init SQL — node2's schema and its copy of the `repl`
      # user arrive purely via replication (see mariadb/init/01-init.sh).
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro
      - node1_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  mariadb-node2:
    image: quay.io/mariadb-foundation/mariadb-devel:13.1-preview
    container_name: siem-tracker-multimaster-node2
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MARIADB_REPL_PASSWORD: ${MARIADB_REPL_PASSWORD:-repl_password}
    entrypoint:
      - sh
      - -c
      - >-
        (
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -hmariadb-node1 -urepl -p"$$MARIADB_REPL_PASSWORD" -e 'SELECT 1' >/dev/null 2>&1; do sleep 2; done;
        until mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e "STOP SLAVE; CHANGE MASTER TO MASTER_HOST='mariadb-node1', MASTER_USER='repl', MASTER_PASSWORD='$$MARIADB_REPL_PASSWORD', MASTER_USE_GTID=current_pos; START SLAVE;" &&
        sleep 3 &&
        [ "$$(mariadb -h127.0.0.1 -uroot -p"$$MARIADB_ROOT_PASSWORD" -e 'SHOW SLAVE STATUS\G' 2>/dev/null | grep -Ec 'Slave_(IO|SQL)_Running: Yes')" = 2 ];
        do sleep 5; done
        ) &
        exec docker-entrypoint.sh mariadbd --server-id=2 --auto-increment-offset=2
    ports:
      - "3337:3306"
    volumes:
      - ./mariadb/multimaster.cnf:/etc/mysql/conf.d/multimaster.cnf:ro
      - node2_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # FR-42/43 restore-helper: NOT part of the app's normal data path — used only
  # to stage legacy pg_dump restores (pg_restore's temp database) before
  # porting the data into the MariaDB target.
  postgres:
    image: postgres:18
    container_name: siem-tracker-multimaster-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
    ports:
      - "5443:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # External scheduler service (FR-46): a thin Bun trigger that polls the app's
  # /api/scheduler/config and fires due jobs (scheduled report delivery) via
  # /api/scheduler/run. It holds NO business logic, DB access, or SMTP
  # credentials — everything runs inside the app. Requires SCHEDULER_TOKEN in
  # .env (must match the app service's copy above); when the token is unset the
  # container exits immediately and `unless-stopped` respawns it in a loop, so
  # comment this service out if you don't use scheduled report delivery.
  scheduler:
    image: ngmaibulat/usiem-scheduler:latest
    container_name: siem-tracker-multimaster-scheduler
    depends_on:
      app:
        condition: service_started
    environment:
      APP_INTERNAL_URL: http://app:3000
      SCHEDULER_TOKEN: ${SCHEDULER_TOKEN:-}
    restart: unless-stopped

  # Reverse proxy, mirroring ../default: the ONLY web entry point (the app
  # publishes no ports). Serves the entrypoint-seeded bootstrap HTTP config
  # until the setup wizard generates the real one (+ TLS) into the shared
  # volumes; after the wizard, apply the new config with:
  #
  #   docker compose exec nginx nginx -s reload
  #
  # NOTE: every lab's nginx binds host 80/443, so only one lab (default
  # included) can be up at a time.
  nginx:
    image: nginx:alpine
    container_name: siem-tracker-multimaster-nginx
    depends_on:
      - app
    # Wait for the app entrypoint to seed the bootstrap config on first boot:
    # depends_on only orders container STARTS, so nginx could read the shared
    # volume before app.conf exists and come up with no server block. The wait
    # is milliseconds in practice.
    command: >
      sh -c 'while [ ! -f /etc/nginx/conf.d/app.conf ]; do sleep 0.3; done;
      exec nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config + certs come from the app (wizard-generated; app entrypoint
      # seeds a bootstrap HTTP config on first boot). Read-only on this side.
      # `nocopy` keeps the image's default.conf welcome page from seeding the
      # shared volume before the app writes the real config.
      - type: volume
        source: proxy_conf
        target: /etc/nginx/conf.d
        read_only: true
        volume:
          nocopy: true
      - type: volume
        source: proxy_certs
        target: /etc/nginx/certs
        read_only: true
        volume:
          nocopy: true
      # Mounting /var/log/nginx hides the image's stdout/stderr symlinks, so
      # access.log/error.log become real files persisted across recreation.
      - nginx_logs:/var/log/nginx
    restart: unless-stopped

volumes:
  node1_data:
  node2_data:
  postgres_data:
  redis_data:
  minio_data:
  app_data:
  app_backups:
  # app ⇄ nginx shared: generated config (app.conf) and TLS cert/key.
  proxy_conf:
  proxy_certs:
  nginx_logs:
