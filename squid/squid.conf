# Squid forward proxy for the app's OUTBOUND traffic (FR-32). Static config,
# shared by both compose stacks (dev bind-mounts it, prod mounts it read-only).
#
# Purpose: every outbound HTTP/HTTPS call the app makes (Telegram, health
# probes, npm registry checks, holiday import, wizard connectivity test) goes
# through this proxy so its access.log accumulates realistic samples of live
# proxy traffic. It is NOT a caching layer and does not terminate TLS: HTTPS
# appears as `CONNECT host:443` tunnel lines — that is the expected, realistic
# log shape for an enterprise egress proxy without SSL bump.

http_port 3128

# Only the compose-internal networks may use the proxy.
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access deny all

# Log samples are the point; a cache would only add surprise behavior.
cache deny all

# Plain files on the shared log volume (the app's /admin/logs viewer tails
# them by byte offset). stdio: writes access.log as a regular file.
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# External rotation only (the volume is small; dev wipes it with the stack).
logfile_rotate 0

# Fast container stop (default 30s makes `docker compose stop` sluggish).
shutdown_lifetime 3 seconds
